name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (for example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    env:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            runner: ubuntu-latest
            build_script: build:exe:linux-x64
            dist_file: padel-tui
            archive_ext: tar.gz
          - id: linux-arm64
            runner: ubuntu-24.04-arm
            build_script: build:exe:linux-arm64
            dist_file: padel-tui
            archive_ext: tar.gz
          - id: darwin-arm64
            runner: macos-14
            build_script: build:exe:darwin-arm64
            dist_file: padel-tui
            archive_ext: tar.gz
          - id: darwin-x64
            runner: macos-13
            build_script: build:exe:darwin-x64
            dist_file: padel-tui
            archive_ext: tar.gz

    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple code signing certificate
        if: runner.os == 'macOS' && env.BUILD_CERTIFICATE_BASE64 != '' && env.P12_PASSWORD != '' && env.KEYCHAIN_PASSWORD != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ env.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ env.P12_PASSWORD }}
          keychain-password: ${{ env.KEYCHAIN_PASSWORD }}

      - name: Build executable
        run: bun run ${{ matrix.build_script }}
        env:
          PADEL_CODESIGN_IDENTITY: ${{ secrets.PADEL_CODESIGN_IDENTITY }}
          PADEL_CODESIGN_ENTITLEMENTS: scripts/macos-entitlements.plist

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && env.APPLE_NOTARY_ISSUER_ID != '' && env.APPLE_NOTARY_KEY_ID != '' && env.APPLE_NOTARY_PRIVATE_KEY != ''
        shell: bash
        run: |
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          NOTARY_ARCHIVE_PATH="$RUNNER_TEMP/notary-${{ matrix.id }}.zip"

          printf '%s' "$APPLE_NOTARY_PRIVATE_KEY" > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

          ditto -c -k --keepParent "dist/${{ matrix.dist_file }}" "$NOTARY_ARCHIVE_PATH"

          xcrun notarytool submit "$NOTARY_ARCHIVE_PATH" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release-assets
          ASSET_NAME="padel-tui-${RELEASE_TAG}-${{ matrix.id }}.${{ matrix.archive_ext }}"
          tar -czf "release-assets/${ASSET_NAME}" -C dist "${{ matrix.dist_file }}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $assetName = "padel-tui-$env:RELEASE_TAG-${{ matrix.id }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "dist/${{ matrix.dist_file }}" -DestinationPath "release-assets/$assetName" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.id }}
          path: release-assets/*
          if-no-files-found: error

  checksums:
    name: Generate checksums
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          merge-multiple: true
          path: release-assets

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name "SHA256SUMS" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release-assets/SHA256SUMS
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build
      - checksums

    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Build release notes
        env:
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          NOTES_FILE="release-notes.md"
          PREV_TAG="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)"

          {
            echo "## Commits"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "Since \\`$PREV_TAG\\`:"
              echo
              RANGE="${PREV_TAG}..${RELEASE_TAG}"
            else
              RANGE="${RELEASE_TAG}"
            fi

            COMMIT_LINES="$(git log --pretty=format:'- %s ([`%h`](https://github.com/'"$GH_REPO"'/commit/%H))' ${RANGE})"
            if [ -n "$COMMIT_LINES" ]; then
              printf "%s\n" "$COMMIT_LINES"
            else
              echo "- Initial release"
            fi
          } > "$NOTES_FILE"

          echo "RELEASE_NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          merge-multiple: true
          path: release-assets

      - name: Download checksum artifact
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: release-assets

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --notes-file "$RELEASE_NOTES_FILE"
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --title "$RELEASE_TAG" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Download checksum artifact
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: checksums

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"

          SHA_DARWIN_ARM64=$(grep "darwin-arm64" checksums/SHA256SUMS | awk '{print $1}')
          SHA_DARWIN_X64=$(grep "darwin-x64" checksums/SHA256SUMS | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep "linux-arm64" checksums/SHA256SUMS | awk '{print $1}')
          SHA_LINUX_X64=$(grep "linux-x64" checksums/SHA256SUMS | awk '{print $1}')

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/philipp-eisen/homebrew-tap.git" tap
          cd tap

          cat > Formula/padel-tui.rb << FORMULA
          class PadelTui < Formula
            desc "Terminal UI for finding and booking padel courts"
            homepage "https://github.com/philipp-eisen/padel-tui"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/philipp-eisen/padel-tui/releases/download/v#{version}/padel-tui-v#{version}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/philipp-eisen/padel-tui/releases/download/v#{version}/padel-tui-v#{version}-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/philipp-eisen/padel-tui/releases/download/v#{version}/padel-tui-v#{version}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/philipp-eisen/padel-tui/releases/download/v#{version}/padel-tui-v#{version}-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install "padel-tui"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/padel-tui --version")
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/padel-tui.rb
          git commit -m "padel-tui ${VERSION}"
          git push
